name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: windows-latest
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio
        pip install aiogram aiohttp python-dotenv psutil packaging requests beautifulsoup4 pillow || echo "Some dependencies failed"
        pip install customtkinter || echo "customtkinter not available"
        pip install "tkinter-embed>=3.10.0" || echo "tkinter-embed not available"
    
    - name: Run tests
      env:
        PYTHONPATH: ${{ github.workspace }}/system/src
      run: |
        python -m pytest tests/test_error_handler_complex.py -v

