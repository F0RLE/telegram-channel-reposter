name: "Release"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: install dependencies (frontend)
        working-directory: ./src
        run: npm install

      # - name: build frontend
      #   working-directory: ./src
      #   run: npm run build
      #   Note: tauri build runs the beforeBuildCommand which runs npm run build, so this is redundant unless we want to separate them.
      #   We'll let tauri handle it.

      - name: Bump Version
        id: bump
        shell: pwsh
        run: |
          node scripts/utils/bump-version.js > version_output.txt
          $json = Get-Content src/package.json | ConvertFrom-Json
          $NEW_VERSION = $json.version
          echo "NEW_VERSION=$NEW_VERSION" >> $env:GITHUB_ENV
          Write-Host "New version: $NEW_VERSION"

      - name: Commit and Push Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git push

      - name: Create Tag
        run: |
          git tag v${{ env.NEW_VERSION }}
          git push origin v${{ env.NEW_VERSION }}

      - name: Build Portable EXE
        working-directory: ./src
        run: npm run tauri:build

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: "Flux Platform v${{ env.NEW_VERSION }}"
          body: "Automated portable release v${{ env.NEW_VERSION }}"
          draft: false
          prerelease: false
          files: src-tauri/target/x86_64-pc-windows-msvc/release/flux-platform.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
